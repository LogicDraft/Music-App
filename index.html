<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS STUDIO — Virtual Instrument Workstation</title>
  <meta name="description" content="Futuristic virtual instrument studio. Play Piano, Drums, Guitar, Synth and more using your laptop keyboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Mobile Warning -->
  <div id="mobile-warning">
    <div class="mw-inner">
      <div class="mw-icon">🎵</div>
      <h1>NEXUS STUDIO</h1>
      <p>Best experienced on<br /><strong>laptop or desktop.</strong></p>
      <p class="mw-sub">A full keyboard is required to play.</p>
    </div>
  </div>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="ld-content">
      <div class="ld-logo">NEXUS<span>STUDIO</span></div>
      <div class="ld-sub">VIRTUAL INSTRUMENT WORKSTATION</div>
      <div class="ld-bar-wrap"><div class="ld-bar" id="ld-bar"></div></div>
      <div class="ld-status" id="ld-status">Initializing...</div>
      <div class="ld-eq">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <canvas id="bg-canvas"></canvas>

    <!-- Header -->
    <header id="app-header">
      <div class="h-logo">
        <span class="h-nx">NX</span><span class="h-st">STUDIO</span>
      </div>
      <div id="inst-badge"></div>
      <div class="h-controls">
        <button id="btn-theme" class="hbtn">🌓 THEME</button>
        <button id="btn-fullscreen" class="hbtn">⛶ FULL</button>
      </div>
    </header>

    <!-- Instrument Selector -->
    <div id="inst-selector">
      <button class="inst-btn active" data-inst="piano">🎹 PIANO</button>
      <button class="inst-btn" data-inst="epiano">🎹 E-PIANO</button>
      <button class="inst-btn" data-inst="synth">🎛️ SYNTH</button>
      <button class="inst-btn" data-inst="guitar">🎸 GUITAR</button>
      <button class="inst-btn" data-inst="bass">🎸 BASS</button>
      <button class="inst-btn" data-inst="violin">🎻 VIOLIN</button>
      <button class="inst-btn" data-inst="flute">🪈 FLUTE</button>
      <button class="inst-btn" data-inst="drums">🥁 DRUMS</button>
      <button class="inst-btn" data-inst="pads">✨ EDM PADS</button>
    </div>

    <main id="main">

      <!-- Controls row -->
      <div id="controls-row">
        <div class="ctrl-grp">
          <label class="ctrl-lbl">VOLUME</label>
          <input type="range" id="vol" min="0" max="1" step="0.01" value="0.75" />
          <span class="ctrl-val" id="vol-val">75%</span>
        </div>
        <div class="ctrl-grp">
          <label class="ctrl-lbl">OCTAVE</label>
          <button class="oct-btn" id="oct-dn">▼</button>
          <span class="oct-val" id="oct-val">4</span>
          <button class="oct-btn" id="oct-up">▲</button>
        </div>
        <div class="ctrl-grp">
          <label class="ctrl-lbl">SUSTAIN</label>
          <button class="tog" id="btn-sustain" data-on="false">OFF</button>
        </div>
        <div class="ctrl-grp">
          <label class="ctrl-lbl">FX</label>
          <button class="tog" id="btn-reverb" data-on="true">REVERB</button>
          <button class="tog" id="btn-echo" data-on="false">ECHO</button>
        </div>
        <div class="ctrl-grp">
          <label class="ctrl-lbl">RECORD</label>
          <button class="rec-btn" id="btn-rec">⏺ REC</button>
          <button class="rec-btn" id="btn-play" disabled>▶ PLAY</button>
          <button class="tog" id="btn-loop" data-on="false">LOOP</button>
          <button class="rec-btn" id="btn-clr" disabled>■ CLR</button>
        </div>
        <div class="ctrl-grp eq-grp">
          <label class="ctrl-lbl">SPECTRUM</label>
          <div id="eq-bars">
            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
          </div>
        </div>
      </div>

      <!-- Note display -->
      <div id="note-display">
        <span id="note-name">—</span>
        <span id="note-lbl">SELECT AN INSTRUMENT AND PRESS A KEY</span>
      </div>

      <!-- Instrument View (dynamically replaced) -->
      <div id="inst-view"></div>

      <!-- Status Bar -->
      <div id="status-bar">
        <span id="status-txt">READY — Select an instrument above</span>
        <span id="rec-ind" class="hidden"><span class="recdot"></span> RECORDING</span>
      </div>

    </main>
  </div>

  <!-- Ripple layer -->
  <div id="ripple-layer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
  <script src="app.js"></script>
  <script src="app2.js"></script>
</body>
</html>
